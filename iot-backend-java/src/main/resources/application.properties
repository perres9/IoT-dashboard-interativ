# Application identity and HTTP configuration.
spring.application.name=iot-backend-java
server.port=8080

# In-memory database for local experimentation.
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:iotdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Sensor history retention per sensor id.
iot.history.max-per-sensor=500

# MQTT integration settings.
iot.mqtt.enabled=false
iot.mqtt.url=${IOT_MQTT_URL:tcp://broker.hivemq.com:1883}
iot.mqtt.client-id=${IOT_MQTT_CLIENT_ID:iot-backend-java-client}
iot.mqtt.topic=${IOT_MQTT_TOPIC:iot/sensors/+/data}

# Actuator exposure for local observability.
management.endpoints.web.exposure.include=health,info,metrics
